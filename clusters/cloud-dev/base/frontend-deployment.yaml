apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-nginx
  namespace: frontend
spec:
  replicas: 4
  selector:
    matchLabels:
      app: frontend-nginx
  template:
    metadata:
      labels:
        app: frontend-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80